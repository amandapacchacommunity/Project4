<!DOCTYPE html>
<html>
<head>
<title>Nonprofit Advancement Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>

body{
font-family:Arial;
background:#f5f7fb;
margin:40px;
}

h1{
color:#1f3c88;
}

.dashboard{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-bottom:40px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.chart{
background:white;
padding:20px;
margin-top:20px;
border-radius:10px;
}

</style>
</head>

<body>

<h1>Advancement Portfolio Dashboard</h1>

<div class="dashboard">

<div class="card">
<h3>Total Donors</h3>
<p>500</p>
</div>

<div class="card">
<h3>Membership Records</h3>
<p>300</p>
</div>

<div class="card">
<h3>Pledge Records</h3>
<p>200</p>
</div>

</div>

<div class="chart">
<canvas id="membershipChart"></canvas>
</div>

<div class="chart">
<canvas id="pledgeChart"></canvas>
</div>

<script>

new Chart(document.getElementById('membershipChart'),{
type:'bar',
data:{
labels:['Basic','Supporter','Patron'],
datasets:[{
label:'Membership Distribution',
data:[120,100,80]
}]
}
})

new Chart(document.getElementById('pledgeChart'),{
type:'bar',
data:{
labels:['Paid','Outstanding'],
datasets:[{
label:'Pledge Status',
data:[140,60]
}]
}
})

</script>

</body>
</html>
